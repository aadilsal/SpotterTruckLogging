services:
  db:
    image: postgres:15
    container_name: eld_db
    environment:
      POSTGRES_DB: eld_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eld_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: eld_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: eld_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ORS_API_KEY: ${ORS_API_KEY}
      CORS_ALLOW_ALL_ORIGINS: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: eld_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
